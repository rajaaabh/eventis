services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: eventis
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - mysql-data-prod:/var/lib/mysql
    # En prod MySQL n'est pas exposé à l'extérieur
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$(cat /run/secrets/db_password)"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_password

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Volume partagé avec Nginx pour servir les fichiers uploadés
      - laravel-storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    secrets:
      - db_password

  nginx:
    image: nginx:1.31-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - laravel-storage:/var/www/storage:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  mysql-data-prod:
  laravel-storage: